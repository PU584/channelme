<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css">
    <link rel="stylesheet" href="addRemoveStaff.css">
    <style>
        .left-aligned {
            text-align: left;
            margin-left: 0;
        }
        .btn-purple {
            background-color: purple;
            color: white;
        }
        .btn-purple:hover {
            background-color: #d8b6ff;
        }
        .btn-success:hover {
            background-color: #a3e4a3;
        }
        .btn-warning:hover {
            background-color: #ffe699;
        }
        .image-preview-container {
            margin-top: 15px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        .image-preview {
            position: relative;
            width: 100px;
            height: 100px;
        }
        .image-preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 8px;
        }
        .remove-image-btn {
            position: absolute;
            top: 5px;
            right: 5px;
            background: red;
            color: white;
            border: none;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
    </style>
</head>

 <nav class="navbar navbar-expand-lg shadow-sm p-3">
    <div class="container d-flex align-items-center">
        <div class="d-flex align-items-center">
            <a class="navbar-brand fw-bold" href="#">Admin Dashboard</a>
            <h1 style="font-size: 40px; margin-left: 0;font-family:'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;font-weight: 300;">Admin Dashboard</h1> <!-- Use margin-left: 0 -->
        </div>
        <div class="ms-auto d-flex align-items-center">
            <button class="btn btn-primary me-2">Login</button>
            <button class="btn btn-danger me-3">Logout</button>
            <img src="/staff/images/staff.avif" alt="Doctor Profile" class="profile-img">
        </div>
    </div>
</nav>

<div class="d-flex gap-3 flex-wrap mb-4 button-container justify-content-start">
   
    <button class="btn btn-success" onclick="window.location.href='admin.html'">
        <i class="bi bi-envelope"></i> View Appointments
    </button>
    
    <button class="btn btn-purple" style="background-color: rgb(221, 104, 8);" onclick="window.location.href='addRemoveStaff.html'">
        <i class="bi bi-person-plus"></i> Add/Remove Staff
    </button>
    <button class="btn btn-warning" style="background-color: maroon; border-color: rgb(12, 12, 12);color: white;" onclick="window.location.href='addRemoveStaff.html'">
        <i class="bi bi-file-earmark-text"></i> Generate Report
    </button>
    
</div>



    
<div class="container mt-4" style="border-color: black; box-sizing: border-box; border-width: 2ch;">
    <h4 class="mb-3">Add a staff member</h4>
    <form id="addStaffForm" method="POST" action="addRemoveStaff.php" class="row g-3" enctype="multipart/form-data">
        <div class="col-md-4">
            <label for="staffId" class="form-label">Staff ID</label>
            <input type="text" class="form-control" id="staffId" name="staffId" required>
        </div>
        <div class="col-md-4">
            <label for="firstName" class="form-label">First Name</label>
            <input type="text" class="form-control" id="firstName" name="firstName" required>
        </div>
        <div class="col-md-4">
            <label for="lastName" class="form-label">Last Name</label>
            <input type="text" class="form-control" id="lastName" name="lastName" required>
        </div>
        <div class="col-md-4">
            <label for="email" class="form-label">Email</label>
            <input type="email" class="form-control" id="email" name="email" required>
        </div>
        <div class="col-md-4">
            <label for="position" class="form-label">Position</label>
            <input type="text" class="form-control" id="position" name="position" required>
        </div>
        <div class="col-md-4">
            <label for="staffImages" class="form-label">Profile (Max 4)</label>
            <input type="file" class="form-control" id="staffImages" name="staffImages[]" accept="image/*" multiple required>
        </div>
        <div id="selectedImageContainer" class="image-preview-container"></div>
        <div class="col-12">
            <label class="form-label">Accessible Pages</label>
            <div class="form-check">
                <input class="form-check-input" type="checkbox" name="accessiblePages[]" value="Page 1">
                <label class="form-check-label">Page 1</label>
            </div>
            <div class="form-check">
                <input class="form-check-input" type="checkbox" name="accessiblePages[]" value="Page 2">
                <label class="form-check-label">Page 2</label>
            </div>
            <div class="form-check">
                <input class="form-check-input" type="checkbox" name="accessiblePages[]" value="Page 3">
                <label class="form-check-label">Page 3</label>
            </div>
            <div class="form-check">
                <input class="form-check-input" type="checkbox" name="accessiblePages[]" value="Page 4">
                <label class="form-check-label">Page 4</label>
            </div>
        </div>
        <div class="col-12 mt-5"> 
            <button type="submit" class="btn btn-primary me-3">Add member</button>
            <button type="button" class="btn btn-danger" id="removeStaff">Remove member</button>
        </div>
    </form>
</div>

    <script src="addRemoveStaff.js"></script>
</body>
</html>
